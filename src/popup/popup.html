<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Better Jira Dots</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="popup__header">
    <div class="popup__title">Better Jira Dots</div>
    <button type="button" id="open-options" class="popup__icon-btn" title="Open settings" aria-label="Open settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    </button>
  </header>

  <label class="toggle">
    <input type="checkbox" id="enabled" />
    <span class="toggle__track"><span class="toggle__thumb"></span></span>
    <span class="toggle__label" id="toggle-label">Enabled</span>
  </label>

  <p class="popup__hint" id="hint">Hiding dots in <strong>To Do</strong> and <strong>Done</strong>; counting working days elsewhere.</p>

  <script src="popup.js"></script>
</body>
</html>
